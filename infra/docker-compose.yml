services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: miqraa-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"                    # WebSocket signaling
      - "7881:7881"                    # TCP fallback for WebRTC
      - "50000-50100:50000-50100/udp"  # WebRTC media (UDP range)
    environment:
      LIVEKIT_KEYS: "devkey: secret"
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: false
          node_ip: 192.168.100.38
        keys:
          devkey: secret
        log_level: debug
    command: ["--dev"]